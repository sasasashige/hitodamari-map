<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人だまりルートプランナー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a4f;
    --green2: #52b788;
    --light: #d8f3dc;
    --bg: #f4f3ef;
    --white: #ffffff;
    --text: #1a1a1a;
    --text2: #666;
    --border: #e0ddd6;
    --orange: #e76f51;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--green);
    color: white;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 1rem; font-weight: 700; }
  header .sub { font-size: 0.72rem; opacity: 0.75; margin-top: 2px; }

  .container { max-width: 600px; margin: 0 auto; padding: 16px; }

  /* ステータスカード */
  .status-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-icon { font-size: 1.6rem; flex-shrink: 0; }
  .status-text { flex: 1; }
  .status-text .title { font-size: 0.85rem; font-weight: 700; }
  .status-text .desc { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

  /* ボタン */
  .btn {
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: var(--radius);
    font-size: 0.9rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-primary { background: var(--green); color: white; }
  .btn-primary:hover { background: #1e4d38; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-orange { background: var(--orange); color: white; }
  .btn-orange:hover { background: #c85a3e; }
  .btn-orange:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 件数フィルター */
  .filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 16px;
    border: 1.5px solid var(--border);
  }
  .filter-row label { font-size: 0.82rem; font-weight: 700; color: var(--green); }
  .filter-row input[type=range] { flex: 1; accent-color: var(--green); }
  .filter-row .count-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--green);
    min-width: 30px;
    text-align: right;
  }

  /* スポットリスト */
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    background: var(--light);
    color: var(--green);
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 700;
  }

  .spot-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .spot-item {
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .spot-item:hover { border-color: var(--green2); }
  .spot-rank {
    min-width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--green);
    color: white;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .spot-info { flex: 1; min-width: 0; }
  .spot-name { font-size: 0.88rem; font-weight: 700; }
  .spot-cat { font-size: 0.7rem; color: var(--green); font-weight: 700; margin-top: 1px; }
  .spot-memo { font-size: 0.72rem; color: var(--text2); margin-top: 3px; line-height: 1.5; }
  .spot-dist {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--green);
    font-weight: 700;
    white-space: nowrap;
    margin-top: 4px;
  }

  /* ローディング */
  .loading {
    text-align: center;
    padding: 32px;
    color: var(--text2);
    font-size: 0.85rem;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .note { font-size: 0.72rem; color: #999; text-align: center; margin-top: 6px; line-height: 1.6; }
  .error { background: #fff3f0; border: 1.5px solid #fca99a; border-radius: var(--radius); padding: 12px 14px; font-size: 0.82rem; color: #c0392b; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>📍 人だまりルートプランナー</h1>
    <div class="sub">現在地から近い順にスポットを表示</div>
  </div>
</header>

<div class="container">

  <!-- ステータス：現在地 -->
  <div class="status-card" id="geoStatus">
    <div class="status-icon">📡</div>
    <div class="status-text">
      <div class="title">現在地を取得していません</div>
      <div class="desc">下のボタンを押して開始してください</div>
    </div>
  </div>

  <!-- ステータス：データ読み込み -->
  <div class="status-card" id="dataStatus">
    <div class="status-icon">🗂️</div>
    <div class="status-text">
      <div class="title">スポットデータ：31件</div>
      <div class="desc">住所情報から位置を計算します</div>
    </div>
  </div>

  <div id="errorBox"></div>

  <!-- メインボタン -->
  <button class="btn btn-primary" id="startBtn" onclick="start()">
    📍 現在地を取得して近い順に並べる
  </button>

  <!-- 件数フィルター（取得後に表示） -->
  <div class="filter-row" id="filterRow" style="display:none;">
    <label>表示件数</label>
    <input type="range" min="5" max="31" value="10" id="countSlider" oninput="updateCount()">
    <div class="count-val" id="countVal">10</div>
  </div>

  <!-- リスト -->
  <div id="spotListArea"></div>

  <!-- ナビボタン -->
  <button class="btn btn-orange" id="navBtn" onclick="openMaps()" style="display:none;" disabled>
    🗺 Googleマップでナビ開始（上位10件）
  </button>
  <div class="note" id="navNote" style="display:none;">出発地：現在地 → 近い順に最大9件を経由</div>

</div>

<script>
// ========== スポットデータ ==========
const RAW_SPOTS = [
  { name: '[施設] さだ図書館', address: '大阪府枚方市北中振3丁目27-10', memo: 'おはなし会（乳幼児向け）。第1・3水曜日 11:00〜11:30' },
  { name: '[公園] 高塚町中央公園', address: '大阪府枚方市高塚町30', memo: 'パルコープの裏。小さい子どもとママが遊びに来てる' },
  { name: '[施設] 伊加賀西町会館', address: '大阪府枚方市伊加賀西町71-11', memo: '子育てサロン（未就園児対象） 10:00〜11:30' },
  { name: '[個人宅] 南さま', address: '大阪府枚方市枚方上之町9-35', memo: '住所違うかも。午前中お子さんとママが花の水やりしてた' },
  { name: '[公園] 伊加賀栄町公園', address: '大阪府枚方市伊加賀栄町9', memo: '子どもとママが遊びに来てる' },
  { name: '[公園] 伊加賀公園(堤町)', address: '大阪府枚方市堤町7', memo: '子どもとママが遊びに来てる' },
  { name: '[住宅地] ヒルズシティ付近', address: '大阪府枚方市高塚町30-1', memo: 'わんちゃん散歩の方が多い' },
  { name: '[公園] オーパスの横の公園', address: '大阪府枚方市高塚町30-25', memo: '送迎バスの時間帯 ママさんが多い' },
  { name: '[店舗] 西松屋', address: '大阪府枚方市伊加賀南町2-50', memo: '子ども連れが多い' },
  { name: '[住宅地] 出口4丁目22のブロック', address: '大阪府枚方市出口4丁目22', memo: 'お子さまのいる家庭が何軒かある' },
  { name: '[住宅地] 出口4丁目38のブロック', address: '大阪府枚方市出口4丁目38', memo: 'お子さまのいる家庭が何軒かある' },
  { name: '[施設] 子育てサロンさくらんぼ・さだ西臨時保育室', address: '大阪府枚方市出口6丁目20', memo: '3/10(火) 9:45〜11:30 手遊び・制作' },
  { name: '[住宅地] 出口5丁目25のブロック', address: '大阪府枚方市出口5丁目25', memo: '新築が6軒うち何軒かはお子さまがいるようです' },
  { name: '[住宅地] ファインシティ枚方', address: '大阪府枚方市出口1丁目3-10', memo: '9:10頃 幼稚園バス送り' },
  { name: '[施設] 光善寺保育園（ぱんだっこ）', address: '大阪府枚方市出口4丁目36-5', memo: '地域開放している遊び場 10〜12時 入退室自由' },
  { name: '[店舗] セブンの向かい', address: '大阪府枚方市出口4丁目36-5', memo: '9:15頃 子ども連れのお母さんがおしゃべり' },
  { name: '[バス停] パークオアシス', address: '大阪府枚方市出口1丁目17-1', memo: '9:10頃 幼稚園バス送り' },
  { name: '[住宅地] 香里ケ丘ウエストヒルズ付近', address: '大阪府枚方市東中振1丁目34-3', memo: '周辺に新しい住宅地もある' },
  { name: '[住宅地] 子どもがたくさんいそうな住宅地', address: '大阪府枚方市翠香園町24', memo: '子どもがたくさんいそう' },
  { name: '[公園] 南中振公園', address: '大阪府枚方市南中振2丁目76-1', memo: '' },
  { name: '[個人宅] ○○さま（翠香園町）', address: '大阪府枚方市翠香園町18-1', memo: '周辺にある一軒家。おこさまがいる' },
  { name: '[バス停] 送迎後のママたち（南中振）', address: '大阪府枚方市南中振2丁目84-3', memo: '送迎後のママたち' },
  { name: '[公園] 翠香園ふれあい公園', address: '大阪府枚方市翠香園町8-5', memo: '' },
  { name: '[住宅地] ルネヒューマンズガーデン枚方', address: '大阪府枚方市出口1丁目2-16', memo: '南西に幼稚園送り後のママいる' },
  { name: '[バス停] ひらかたパーク', address: '大阪府枚方市枚方公園町1-1', memo: '送迎前後、バス停に人だまり。朝8:27、帰り2:45、みどりバス' },
  { name: '[バス停] 伊加賀西町北公園', address: '大阪府枚方市伊加賀西町56', memo: '送迎前後、朝8:44、帰り2:56、赤バス。周辺に新しい家有' },
  { name: '[バス停] 出口ふれあい公園', address: '大阪府枚方市出口2丁目1-18', memo: '送迎前後、朝8:55、帰り3:07、赤バス' },
  { name: '[個人宅] ○○さま（伊加賀栄町）', address: '大阪府枚方市伊加賀栄町17-17-2', memo: '半年ほど前にできた新しい家。1-2歳の子どもがいる' },
  { name: '[住宅地] 伊加賀栄町23のブロック', address: '大阪府枚方市伊加賀栄町23', memo: '新しいおうちが多く、子どもがいっぱい' },
  { name: '[公園] 伊加賀栄公園', address: '大阪府枚方市伊加賀栄町9', memo: 'アプロの前' },
  { name: '[店舗] コノミヤ 枚方店', address: '大阪府枚方市伊加賀緑町1-15', memo: '月曜日10%オフ' },
];

// ========== 状態 ==========
let currentLat = null;
let currentLng = null;
let geocodedSpots = [];
let sortedSpots = [];
let displayCount = 10;

// ========== 距離計算 ==========
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function formatDist(km) {
  return km < 1 ? `${Math.round(km*1000)}m` : `${km.toFixed(1)}km`;
}

// ========== ジオコーディング ==========
async function geocodeAddress(address) {
  const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`;
  const res = await fetch(url, { headers: { 'User-Agent': 'spot-map/1.0' } });
  const data = await res.json();
  if (data && data.length > 0) {
    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
  }
  return null;
}

// ========== メイン処理 ==========
async function start() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  clearError();

  // Step1: 現在地取得
  updateGeoStatus('⏳', '現在地を取得中...', 'ブラウザの許可ダイアログを確認してください');
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 10000 });
    });
    currentLat = pos.coords.latitude;
    currentLng = pos.coords.longitude;
    updateGeoStatus('✅', '現在地を取得しました', `緯度 ${currentLat.toFixed(4)} / 経度 ${currentLng.toFixed(4)}`);
  } catch (e) {
    updateGeoStatus('❌', '現在地の取得に失敗しました', '位置情報の許可を確認してください');
    showError('位置情報を取得できませんでした。ブラウザの設定で位置情報を許可してください。');
    btn.disabled = false;
    btn.textContent = '📍 現在地を取得して近い順に並べる';
    return;
  }

  // Step2: ジオコーディング（未取得のみ）
  if (geocodedSpots.length === 0) {
    showLoading('住所から位置情報を取得中... (31件)');
    const results = [];
    for (let i = 0; i < RAW_SPOTS.length; i++) {
      const s = RAW_SPOTS[i];
      showLoading(`住所から位置情報を取得中... (${i+1}/31件)`);
      try {
        const geo = await geocodeAddress(s.address);
        results.push({ ...s, lat: geo?.lat || null, lng: geo?.lng || null });
      } catch {
        results.push({ ...s, lat: null, lng: null });
      }
      await new Promise(r => setTimeout(r, 300)); // レート制限対策
    }
    geocodedSpots = results.filter(s => s.lat && s.lng);
    const failed = results.length - geocodedSpots.length;
    updateDataStatus('✅', `位置取得完了：${geocodedSpots.length}件`, failed > 0 ? `${failed}件は住所が見つかりませんでした` : '全件取得成功');
  }

  // Step3: 距離計算＆ソート
  sortedSpots = geocodedSpots.map(s => ({
    ...s,
    dist: haversine(currentLat, currentLng, s.lat, s.lng)
  })).sort((a, b) => a.dist - b.dist);

  // Step4: 表示
  document.getElementById('filterRow').style.display = 'flex';
  document.getElementById('navBtn').style.display = 'block';
  document.getElementById('navNote').style.display = 'block';
  renderList();

  btn.textContent = '🔄 現在地を更新して再計算';
  btn.disabled = false;
}

function renderList() {
  const area = document.getElementById('spotListArea');
  const count = parseInt(document.getElementById('countSlider').value);
  displayCount = count;

  if (sortedSpots.length === 0) {
    area.innerHTML = '<div class="loading"><div class="spinner"></div><p>データがありません</p></div>';
    return;
  }

  const shown = sortedSpots.slice(0, count);
  area.innerHTML = `
    <div class="section-title">
      近い順リスト <span class="badge">${count}件表示</span>
    </div>
    <div class="spot-list">
      ${shown.map((s, i) => `
        <div class="spot-item" onclick="openSpotMap('${s.lat}','${s.lng}')">
          <div class="spot-rank">${i+1}</div>
          <div class="spot-info">
            <div class="spot-name">${s.name.replace(/^\[.+?\]\s?/, '')}</div>
            <div class="spot-cat">${s.name.match(/^\[(.+?)\]/)?.[1] || ''}</div>
            ${s.memo ? `<div class="spot-memo">${s.memo}</div>` : ''}
            <div class="spot-dist">📏 直線 ${formatDist(s.dist)}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('navBtn').disabled = false;
  document.getElementById('navBtn').textContent = `🗺 Googleマップでナビ開始（上位${Math.min(count,10)}件）`;
}

function updateCount() {
  const val = document.getElementById('countSlider').value;
  document.getElementById('countVal').textContent = val;
  renderList();
}

function openSpotMap(lat, lng) {
  window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
}

function openMaps() {
  if (!currentLat || sortedSpots.length === 0) return;
  const targets = sortedSpots.slice(0, Math.min(displayCount, 10));
  const origin = `${currentLat},${currentLng}`;
  const dest = targets[targets.length - 1];
  const waypoints = targets.slice(0, -1).map(s => `${s.lat},${s.lng}`).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest.lat},${dest.lng}&travelmode=driving`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  window.open(url, '_blank');
}

// ========== UI ヘルパー ==========
function updateGeoStatus(icon, title, desc) {
  document.getElementById('geoStatus').innerHTML = `
    <div class="status-icon">${icon}</div>
    <div class="status-text">
      <div class="title">${title}</div>
      <div class="desc">${desc}</div>
    </div>`;
}
function updateDataStatus(icon, title, desc) {
  document.getElementById('dataStatus').innerHTML = `
    <div class="status-icon">${icon}</div>
    <div class="status-text">
      <div class="title">${title}</div>
      <div class="desc">${desc}</div>
    </div>`;
}
function showLoading(msg) {
  document.getElementById('spotListArea').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>${msg}</p>
    </div>`;
}
function showError(msg) {
  document.getElementById('errorBox').innerHTML = `<div class="error">⚠️ ${msg}</div>`;
}
function clearError() {
  document.getElementById('errorBox').innerHTML = '';
}
</script>
</body>
</html>
