<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

}

.app {

}

/* ─── Header ─── */
.header {
  background: linear-gradient(135deg, #1e293b 0%, #334155 100%);

}
.header-inner {
  display: flex;
  justify-content: space-between;

}
.header-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-icon { font-size: 22px; }
.header h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.header-sub {
  font-size: 11px;
  opacity: 0.7;
  margin-top: 2px;
}
.badge {
  background: rgba(255,255,255,0.15);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  backdrop-filter: blur(4px);
}

/* ─── Body ─── */
.body { padding: 0 12px 32px; }
.section { margin-top: 14px; }

/* ─── Location Button ─── */
.loc-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 16px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #1e293b 0%, #475569 100%);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(30,41,59,0.25);
  transition: transform 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.loc-btn:active { transform: scale(0.98); }
.loc-btn:disabled { opacity: 0.7; }
.loc-btn .icon { font-size: 18px; }

.spinner {
  display: inline-block;
  animation: spin 1s linear infinite;
  font-size: 18px;
}

.msg-error {
  color: #dc2626; font-size: 12px; margin-top: 8px;
  padding: 8px 12px; background: #fef2f2; border-radius: 8px;
}
.msg-ok {
  color: #16a34a; font-size: 12px; margin-top: 8px;
  padding: 8px 12px; background: #f0fdf4; border-radius: 8px;
}

/* ─── Category Filters ─── */
.filter-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.cat-chip {
  padding: 6px 12px;
  border-radius: 20px;
  border: 1.5px solid #e2e8f0;
  font-size: 12px;
  font-weight: 500;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  background: #f8fafc;
  color: #94a3b8;
  -webkit-tap-highlight-color: transparent;
}
.cat-chip.active {
  border-color: var(--cat-color-40);
  background: var(--cat-bg);
  color: var(--cat-color);
}
.cat-chip.all-active {
  background: #1e293b;
  color: #fff;
  border-color: #1e293b;
}

/* ─── Slider ─── */
.slider-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.slider-label { font-size: 13px; font-weight: 500; color: #475569; }
.slider-value { font-size: 14px; font-weight: 700; color: #1e293b; }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%;
  height: 6px;
  border-radius: 3px;
  background: #e2e8f0;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: #1e293b;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* ─── Nav Button ─── */
.nav-btn {

  justify-content: center;
  gap: 8px;

  padding: 14px 16px;

.hidden { display: none !important; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }

// ━━━ State ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let myPos = null;

// ━━━ Haversine ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  return km < 1 ? Math.round(km * 1000) + 'm' : km.toFixed(1) + 'km';
}

// ━━━ URL Helpers ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function spotMapUrl(s) {
  return `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
}
function navUrl(lat, lng, spots) {
  if (!spots.length) return '#';
  const dest = spots[spots.length - 1];
  const wp = spots.slice(0, -1);
  let url = `https://www.google.com/maps/dir/${lat},${lng}`;
  wp.forEach(s => url += `/${s.lat},${s.lng}`);
  url += `/${dest.lat},${dest.lng}`;
  return url;
}

// ━━━ Location ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getLocation() {
  if (!navigator.geolocation) {
    showLocMsg('error', 'この端末では位置情報を利用できません');
    return;
  }
  const btn = document.getElementById('locBtn');
  const txt = document.getElementById('locBtnText');
  btn.disabled = true;
  txt.textContent = '取得中...';
  btn.querySelector('.icon').outerHTML = '<span class="spinner">⟳</span>';

  navigator.geolocation.getCurrentPosition(
    pos => {
      myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      btn.disabled = false;
      btn.innerHTML = '<span class="icon">📡</span><span>現在地を更新</span>';
      showLocMsg('ok', `✓ 現在地を取得しました（${myPos.lat.toFixed(4)}, ${myPos.lng.toFixed(4)}）`);
      render();
    },
    err => {
      btn.disabled = false;
      btn.innerHTML = '<span class="icon">📡</span><span id="locBtnText">現在地を取得して近い順に並べる</span>';
      showLocMsg('error', err.code === 1 ? '位置情報の許可が必要です' : '位置情報を取得できませんでした');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function showLocMsg(type, text) {
  const el = document.getElementById('locMsg');
  el.innerHTML = `<div class="msg-${type === 'error' ? 'error' : 'ok'}">${text}</div>`;
}

// ━━━ Filter ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleCat(cat) {
  if (activeCats.has(cat)) {
    if (activeCats.size === 1) return;
    activeCats.delete(cat);
  } else {
    activeCats.add(cat);
  }
  render();
}

function selectAllCats() {
  activeCats = new Set(ALL_CATS);
  render();
}

function onSliderChange(val) {
  showCount = Number(val);
  document.getElementById('sliderValue').textContent = showCount + '件';
  render();
}

// ━━━ Render ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderFilters() {
  const row = document.getElementById('filterRow');
  let html = `<button class="cat-chip ${activeCats.size === ALL_CATS.length ? 'all-active' : ''}" onclick="selectAllCats()">すべて</button>`;
  ALL_CATS.forEach(cat => {
    const cfg = CAT_CONFIG[cat];
    const active = activeCats.has(cat);
    html += `<button class="cat-chip ${active ? 'active' : ''}" 
      style="--cat-color:${cfg.color}; --cat-bg:${cfg.bg}; --cat-color-40:${cfg.color}40"
      onclick="toggleCat('${cat}')">${cfg.icon} ${cat}</button>`;
  });
  row.innerHTML = html;
}

function render() {
  renderFilters();

  // Process spots
  let spots = SPOTS.filter(s => activeCats.has(s.cat)).map(s => ({
    ...s,
    dist: myPos ? haversine(myPos.lat, myPos.lng, s.lat, s.lng) : null
  }));
  if (myPos) spots.sort((a, b) => a.dist - b.dist);

  const displayed = spots.slice(0, showCount);
  const navSpots = displayed.slice(0, 10);

  // Badge
  document.getElementById('countBadge').textContent = spots.length + '件';

  // Nav section
  const navSection = document.getElementById('navSection');
  if (myPos && displayed.length > 0) {
    navSection.classList.remove('hidden');
    document.getElementById('navBtn').href = navUrl(myPos.lat, myPos.lng, navSpots);
    document.getElementById('navBtnText').textContent = `Googleマップでナビ開始（上位${navSpots.length}件）`;
    document.getElementById('navNote').classList.toggle('hidden', displayed.length <= 10);
  } else {
    navSection.classList.add('hidden');
  }

  // Spot list
  const list = document.getElementById('spotList');
  const empty = document.getElementById('emptyState');

  if (displayed.length === 0) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = displayed.map((spot, idx) => {
    const cfg = CAT_CONFIG[spot.cat];
    const expanded = expandedId === spot.id;
    return `
      <div class="card" style="--cat-color:${cfg.color}; animation-delay:${idx * 0.03}s">
        <div class="card-main" onclick="toggleExpand(${spot.id})">
          <div class="card-left">
            ${myPos ? `<div class="rank"><span class="rank-num">${idx + 1}</span></div>` : ''}
            <div class="card-info">
              <div class="card-header">
                <span class="cat-tag" style="--cat-bg:${cfg.bg}; --cat-color:${cfg.color}">${cfg.icon} ${spot.cat}</span>
                ${spot.dist !== null ? `<span class="dist">${formatDist(spot.dist)}</span>` : ''}
              </div>
              <div class="spot-name">${spot.name}</div>
              <div class="memo">${spot.memo}</div>
            </div>
          </div>
          <div class="chevron">${expanded ? '▲' : '▼'}</div>
        </div>
        ${expanded ? `
          <div class="card-expanded">
            <div class="address">📮 ${spot.address}</div>
            <div class="card-actions">
              <a class="action-btn green" href="${spotMapUrl(spot)}" target="_blank" rel="noopener noreferrer">
                📍 マップで見る
              </a>
              ${myPos ? `<a class="action-btn blue" href="${navUrl(myPos.lat, myPos.lng, [spot])}" target="_blank" rel="noopener noreferrer">
                🧭 ナビ開始
              </a>` : ''}
            </div>
          </div>
        ` : ''}
      </div>`;
  }).join('');
}

function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
render();
</script>
</body>
</html>
