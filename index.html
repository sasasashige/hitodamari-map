<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>人だまりマップ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #f5f5f5;
  color: #222;
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

.app { max-width: 480px; margin: 0 auto; }

/* ── Header ── */
.header {
  background: #222;
  color: #fff;
  padding: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 16px; font-weight: 700; }

/* ── Buttons ── */
.body { padding: 12px; }

.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.85; }
.btn:disabled { opacity: 0.5; }

.btn-dark {
  background: #222;
  color: #fff;
}
.btn-blue {
  background: #2563eb;
  color: #fff;
  margin-top: 8px;
}

.msg {
  font-size: 12px;
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 6px;
}
.msg-ok { color: #16a34a; background: #f0fdf4; }
.msg-err { color: #dc2626; background: #fef2f2; }

/* ── List ── */
.list { margin-top: 14px; }

.item {
  background: #fff;
  border-radius: 10px;
  margin-bottom: 6px;
  overflow: hidden;
}
.item-main {
  display: flex;
  align-items: center;
  padding: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  gap: 10px;
}
.item-rank {
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  background: #f0f0f0;
  border-radius: 6px;
  font-size: 12px; font-weight: 700; color: #666;
  flex-shrink: 0;
}
.item-body { flex: 1; min-width: 0; }
.item-top {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.item-cat {
  font-size: 10px; font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  white-space: nowrap;
}
.item-dist {
  font-size: 11px; color: #888; font-weight: 600;
}
.item-name {
  font-size: 13px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.item-memo {
  font-size: 11px; color: #888; margin-top: 1px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.item-arrow {
  font-size: 9px; color: #ccc; flex-shrink: 0;
}

.item-detail {
  padding: 0 12px 12px;
  border-top: 1px solid #f0f0f0;
}
.item-addr {
  font-size: 11px; color: #666;
  margin: 8px 0;
}
.item-actions {
  display: flex; gap: 6px;
}
.action-btn {
  flex: 1;
  display: block;
  padding: 9px;
  border-radius: 8px;
  color: #fff;
  font-size: 11px; font-weight: 600;
  text-align: center;
  text-decoration: none;
}
.action-btn:active { opacity: 0.85; }
.bg-green { background: #16a34a; }
.bg-blue { background: #2563eb; }

/* ── Category colors ── */
.cat-公園   { background: #dcfce7; color: #16a34a; }
.cat-施設   { background: #dbeafe; color: #2563eb; }
.cat-店舗   { background: #ffedd5; color: #ea580c; }
.cat-住宅地 { background: #ede9fe; color: #7c3aed; }
.cat-個人宅 { background: #fce7f3; color: #db2777; }
.cat-バス停 { background: #cffafe; color: #0891b2; }

.spinner {
  display: inline-block;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📍 人だまりマップ</h1>

  </div>

  <div class="body">
    <button class="btn btn-dark" id="locBtn" onclick="getLocation()">
      現在地を取得して近い順に並べる
    </button>
    <a class="btn btn-blue hidden" id="navBtn" href="#" target="_blank">
      🗺️ Googleマップでナビ開始
    </a>
    <div id="msg"></div>
    <div class="list" id="list"></div>
  </div>
</div>

<script>
// ━━━ Data ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ✓=Google Places API確定 / ~=町丁目エリア代表座標
const SPOTS = [
  {id:1, cat:"施設",name:"さだ図書館",address:"枚方市北中振3丁目27-10",memo:"おはなし会 第1・3水曜 11:00〜11:30",lat:34.7970018,lng:135.6286531},// ✓
  {id:2, cat:"公園",name:"高塚町中央公園",address:"枚方市高塚町30",memo:"パルコープの裏。子どもとママ",lat:34.8065389,lng:135.6431078},// ✓
  {id:3, cat:"施設",name:"伊加賀西町会館",address:"枚方市伊加賀西町71-11",memo:"子育てサロン 10:00〜11:30",lat:34.8064683,lng:135.6298291},// ✓
  {id:4, cat:"個人宅",name:"南さま",address:"枚方市枚方上之町9-35",memo:"午前中ママと花の水やり",lat:34.8102486,lng:135.6438308},// ~枚方上之町
  {id:5, cat:"公園",name:"伊加賀栄町公園",address:"枚方市伊加賀栄町9",memo:"子どもとママが遊びに来てる",lat:34.8058571,lng:135.6353890},// ✓
  {id:6, cat:"公園",name:"伊加賀公園(堤町)",address:"枚方市堤町7",memo:"子どもとママが遊びに来てる",lat:34.8113921,lng:135.6376781},// ✓
  {id:7, cat:"住宅地",name:"ヒルズシティ付近",address:"枚方市高塚町30-1",memo:"わんちゃん散歩の方が多い",lat:34.8072396,lng:135.6434369},// ✓
  {id:8, cat:"公園",name:"オーパスの横の公園",address:"枚方市高塚町30-25",memo:"送迎バスの時間帯 ママさんが多い",lat:34.8056895,lng:135.6435107},// ✓
  {id:9, cat:"店舗",name:"西松屋",address:"枚方市伊加賀南町2-50",memo:"子ども連れが多い",lat:34.8090969,lng:135.6389140},// ✓
  {id:10,cat:"住宅地",name:"出口4丁目22のブロック",address:"枚方市出口4丁目22",memo:"お子さまのいる家庭が何軒かある",lat:34.8005,lng:135.6232},// ~出口4丁目
  {id:11,cat:"住宅地",name:"出口4丁目38のブロック",address:"枚方市出口4丁目38",memo:"お子さまのいる家庭が何軒かある",lat:34.7993,lng:135.6222},// ~光善寺保育園付近
  {id:12,cat:"施設",name:"子育てサロンさくらんぼ",address:"枚方市出口6丁目20",memo:"9:45〜11:30 手遊び・制作",lat:34.7987,lng:135.6200},// ~出口6丁目
  {id:13,cat:"住宅地",name:"出口5丁目25のブロック",address:"枚方市出口5丁目25",memo:"新築6軒、お子さまのいる家庭あり",lat:34.7985,lng:135.6233},// ~出口5丁目
  {id:14,cat:"住宅地",name:"ファインシティ枚方",address:"枚方市出口1丁目3-10",memo:"9:10頃 幼稚園バス送り",lat:34.8031746,lng:135.6279569},// ✓
  {id:15,cat:"施設",name:"光善寺保育園（ぱんだっこ）",address:"枚方市出口4丁目36-5",memo:"地域開放 10〜12時 入退室自由",lat:34.7991257,lng:135.6224622},// ✓
  {id:16,cat:"店舗",name:"セブンの向かい",address:"枚方市出口2丁目24-7",memo:"9:15頃 子連れのお母さんがおしゃべり",lat:34.8026906,lng:135.6217601},// ✓
  {id:17,cat:"バス停",name:"パークオアシス",address:"枚方市出口1丁目17-1",memo:"9:10頃 幼稚園バス送り",lat:34.8023856,lng:135.6281884},// ✓
  {id:18,cat:"住宅地",name:"香里ケ丘ウエストヒルズ付近",address:"枚方市東中振1丁目34-3",memo:"周辺に新しい住宅地もある",lat:34.7956468,lng:135.6451374},// ✓
  {id:19,cat:"住宅地",name:"子どもが多い住宅地",address:"枚方市翠香園町24",memo:"子どもがたくさんいそう",lat:34.8005,lng:135.6385},// ~翠香園町
  {id:20,cat:"公園",name:"南中振公園",address:"枚方市南中振2丁目76-1",memo:"—",lat:34.7942918,lng:135.6289814},// ✓
  {id:21,cat:"個人宅",name:"○○さま（翠香園町）",address:"枚方市翠香園町18-1",memo:"一軒家。おこさまがいる",lat:34.8010,lng:135.6388},// ~翠香園町
  {id:22,cat:"バス停",name:"送迎後のママたち（南中振）",address:"枚方市南中振2丁目84-3",memo:"送迎後のママたち",lat:34.7942,lng:135.6292},// ~南中振公園付近
  {id:23,cat:"公園",name:"翠香園ふれあい公園",address:"枚方市翠香園町8-5",memo:"—",lat:34.7998588,lng:135.6367185},// ✓
  {id:24,cat:"住宅地",name:"ルネヒューマンズガーデン枚方",address:"枚方市出口1丁目2-16",memo:"幼稚園送り後のママいる",lat:34.8017758,lng:135.6304254},// ✓
  {id:25,cat:"バス停",name:"ひらかたパーク",address:"枚方市枚方公園町1-1",memo:"朝8:27、帰り2:45、みどりバス",lat:34.8059896,lng:135.6392002},// ✓
  {id:26,cat:"バス停",name:"伊加賀西町北公園",address:"枚方市伊加賀西町56",memo:"朝8:44、帰り2:56、赤バス。新築あり",lat:34.8070542,lng:135.6252535},// ✓
  {id:27,cat:"バス停",name:"出口ふれあい公園",address:"枚方市出口2丁目1-18",memo:"朝8:55、帰り3:07、赤バス",lat:34.8031595,lng:135.6268292},// ✓
  {id:28,cat:"個人宅",name:"○○さま（伊加賀栄町）",address:"枚方市伊加賀栄町17-17-2",memo:"半年前の新築。1-2歳の子ども",lat:34.8058,lng:135.6348},// ~伊加賀栄町
  {id:29,cat:"住宅地",name:"伊加賀栄町23のブロック",address:"枚方市伊加賀栄町23",memo:"新しいおうちが多く子どもがいっぱい",lat:34.8060,lng:135.6352},// ~伊加賀栄町
  {id:30,cat:"公園",name:"伊加賀栄公園",address:"枚方市伊加賀栄町9",memo:"アプロの前",lat:34.8058571,lng:135.6353890},// ✓
  {id:31,cat:"店舗",name:"コノミヤ 枚方店",address:"枚方市伊加賀緑町1-15",memo:"月曜日10%オフ",lat:34.8086202,lng:135.6329772},// ✓
];

const CAT_ICON = {"公園":"🌳","施設":"🏛️","店舗":"🛒","住宅地":"🏘️","個人宅":"🏠","バス停":"🚌"};

// ━━━ State ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let myPos = null;
let expandedId = null;

// ━━━ Haversine (km) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function fmtDist(km) { return km < 1 ? Math.round(km*1000)+'m' : km.toFixed(1)+'km'; }

// ━━━ Google Maps URLs（住所ベース → 正確） ━━━━━━━━━━━━━━
function mapUrl(spot) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(spot.address);
}
function singleNavUrl(spot) {
  if (!myPos) return mapUrl(spot);
  return `https://www.google.com/maps/dir/?api=1&origin=${myPos.lat},${myPos.lng}&destination=${spot.lat},${spot.lng}&travelmode=walking`;
}
function multiNavUrl(spots) {
  if (!myPos || !spots.length) return '#';
  // 座標ベース＋経由地は最大8件（Google Maps制限）
  const limited = spots.slice(0, 9);
  const dest = limited[limited.length - 1];
  const waypoints = limited.slice(0, -1);
  let url = `https://www.google.com/maps/dir/?api=1&origin=${myPos.lat},${myPos.lng}&destination=${dest.lat},${dest.lng}&travelmode=walking`;
  if (waypoints.length > 0) {
    url += '&waypoints=' + waypoints.map(s => `${s.lat},${s.lng}`).join('|');
  }
  return url;
}

// ━━━ Location ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getLocation() {
  if (!navigator.geolocation) {
    showMsg('err', 'この端末では位置情報を利用できません');
    return;
  }
  const btn = document.getElementById('locBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner">⟳</span> 取得中...';

  navigator.geolocation.getCurrentPosition(
    pos => {
      myPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      btn.disabled = false;
      btn.textContent = '現在地を更新して再計算';
      showMsg('ok', '✓ 現在地を取得しました');
      render();
    },
    err => {
      btn.disabled = false;
      btn.textContent = '現在地を取得して近い順に並べる';
      showMsg('err', err.code === 1 ? '位置情報の許可が必要です' : '位置情報を取得できませんでした');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

function showMsg(type, text) {
  document.getElementById('msg').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
}

// ━━━ Render ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function render() {
  let spots = SPOTS.map(s => ({
    ...s,
    dist: myPos ? haversine(myPos.lat, myPos.lng, s.lat, s.lng) : null
  }));
  if (myPos) spots.sort((a, b) => a.dist - b.dist);

  // Nav button（上位9件まで：Google Maps経由地上限）
  const navBtn = document.getElementById('navBtn');
  if (myPos) {
    const navSpots = spots.slice(0, 9);
    navBtn.href = multiNavUrl(navSpots);
    navBtn.textContent = `🗺️ Googleマップでナビ開始（近い順${navSpots.length}件）`;
    navBtn.classList.remove('hidden');
  }

  // List - only show after location is retrieved
  if (!myPos) {
    document.getElementById('list').innerHTML = '';
    return;
  }
  document.getElementById('list').innerHTML = spots.map((s, i) => {
    const exp = expandedId === s.id;
    return `
      <div class="item">
        <div class="item-main" onclick="toggle(${s.id})">
          ${myPos ? `<div class="item-rank">${i+1}</div>` : ''}
          <div class="item-body">
            <div class="item-top">
              <span class="item-cat cat-${s.cat}">${CAT_ICON[s.cat]} ${s.cat}</span>
              ${s.dist !== null ? `<span class="item-dist">${fmtDist(s.dist)}</span>` : ''}
            </div>
            <div class="item-name">${s.name}</div>
            <div class="item-memo">${s.memo}</div>
          </div>
          <div class="item-arrow">${exp ? '▲' : '▼'}</div>
        </div>
        ${exp ? `
          <div class="item-detail">
            <div class="item-addr">📮 ${s.address}</div>
            <div class="item-actions">
              <a class="action-btn bg-green" href="${mapUrl(s)}" target="_blank">📍 マップで見る</a>
              ${myPos ? `<a class="action-btn bg-blue" href="${singleNavUrl(s)}" target="_blank">🧭 ナビ開始</a>` : ''}
            </div>
          </div>
        ` : ''}
      </div>`;
  }).join('');
}

function toggle(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

// ━━━ Init ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
render();
</script>
</body>
</html>
